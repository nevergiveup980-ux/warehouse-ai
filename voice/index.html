<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#14213d"><title>Runlu Voice Alpha 0.1.2</title><style>:root{--navy:#14213d;--blue:#2864e8;--bg:#f3f5f8;--card:#fff;--text:#162036;--muted:#748096;--line:#dfe5ee;--green:#16824a;--red:#b42335}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text)}header{background:var(--navy);color:white;padding:15px 16px;position:sticky;top:0}.head{max-width:760px;margin:auto;display:flex;align-items:center;justify-content:space-between}h1{font-size:19px;margin:0}.version{font-size:11px;background:rgba(255,255,255,.15);padding:6px 9px;border-radius:99px}main{max-width:760px;margin:auto;padding:16px 14px 60px}.card{background:white;border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(20,32,51,.07)}.hero{text-align:center}.hero h2{font-size:38px;margin:12px 0 6px}.sub{color:var(--muted);margin:0}.micWrap{display:flex;justify-content:center;margin:24px 0 14px}.mic{width:150px;height:150px;border:0;border-radius:50%;font-size:58px;color:white;background:linear-gradient(145deg,#3272ef,#1649b8);box-shadow:0 14px 35px rgba(40,100,232,.28)}.mic.listening{background:linear-gradient(145deg,#ef4444,#a8172b);animation:pulse 1.1s infinite}.mic.speaking{background:linear-gradient(145deg,#18a35f,#0e6c3d)}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 26px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}.status{font-size:19px;font-weight:800}.detail{font-size:13px;color:var(--muted);margin-top:5px}.box{border:1px solid var(--line);background:#f7f9fc;border-radius:15px;padding:14px;text-align:left;margin-top:12px;min-height:54px}.answer{border-left:5px solid var(--blue);background:#eef5ff}.row{display:flex;gap:9px;margin-top:11px}.row>*{flex:1}button,input{font:inherit}button{border:0;border-radius:13px;padding:13px;font-weight:800;background:#e8edf4;color:var(--text)}button.primary{background:var(--blue);color:white}button.red{background:#fce8ea;color:var(--red)}input{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;background:white}.switchline{display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;margin-top:14px}.switchline label{font-weight:750}.toggle{width:56px;height:32px;border-radius:99px;background:#cfd6e1;padding:3px;flex:none}.toggle i{display:block;width:26px;height:26px;background:white;border-radius:50%;transition:.2s}.toggle.on{background:var(--green)}.toggle.on i{transform:translateX(24px)}.small{font-size:12px;color:var(--muted);line-height:1.5}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{font-size:12px;padding:8px 10px;border-radius:99px;background:#eef3fb}.log{max-height:220px;overflow:auto;text-align:left}.msg{padding:9px 0;border-top:1px solid var(--line);font-size:13px}.msg:first-child{border-top:0}.who{font-weight:800}</style></head><body><header><div class="head"><h1>🎤 Runlu Voice Alpha</h1><div class="version">0.1.2</div></div></header><main><section class="card hero"><h2>老伙计</h2><p class="sub">我在。今天准备做什么？</p><div class="micWrap"><button id="mic" class="mic">🎤</button></div><div id="status" class="status">点一下麦克风开始</div><div id="detail" class="detail">先测试声音，再打开连续对话。</div><div id="heard" class="box">尚未听到语音。</div><div id="answer" class="box answer">我支持中文、英文和中英混合。</div><div class="row"><button id="soundTest">🔊 测试声音</button><button id="stopAll" class="red">停止</button></div><div class="switchline"><div><label>连续对话</label><div class="small">回答念完后自动重新监听</div></div><div id="toggle" class="toggle"><i></i></div></div><div class="row"><input id="manual" placeholder="语音不可用时，在这里输入"><button id="send" class="primary">发送</button></div></section><section class="card"><h3>可以试着说</h3><div class="chips"><span class="chip">老伙计</span><span class="chip">查询 Heather Choice</span><span class="chip">How many Platinum?</span><span class="chip">收货</span><span class="chip">取消</span></div></section><section class="card"><h3>对话记录</h3><div id="log" class="log"><div class="small">对话会显示在这里。</div></div></section><section class="card"><h3>本次升级</h3><p class="small">0.1.2 重点修复：识别后立即朗读回答；朗读结束后自动重新监听；避免麦克风与朗读互相打架。</p><div class="row"><button onclick="location.href='../'">⬅ 返回 Warehouse AI</button></div></section></main><script>'use strict';const $=id=>document.getElementById(id);const SR=window.SpeechRecognition||window.webkitSpeechRecognition;let recognition=null,listening=false,speaking=false,continuous=false,restartTimer=null,sessionToken=0,currentUtterance=null;const inventory=[{name:'Heather Choice',qty:18,unit:'卷',loc:'B12'},{name:'Platinum',qty:22,unit:'袋',loc:'A08'},{name:'Spill Blocker',qty:16,unit:'袋',loc:'C03'}];function addLog(who,text){const log=$('log');if(log.querySelector('.small'))log.innerHTML='';log.insertAdjacentHTML('afterbegin',`<div class="msg"><span class="who">${who}：</span>${String(text).replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}</div>`)}function setState(type,detail=''){$('mic').classList.remove('listening','speaking');if(type==='listening'){$('mic').classList.add('listening');$('status').textContent='正在听…'}else if(type==='speaking'){$('mic').classList.add('speaking');$('status').textContent='正在说话…'}else $('status').textContent='点一下麦克风继续';$('detail').textContent=detail}function stopRecognition(){if(recognition&&listening){try{recognition.abort()}catch(e){}}listening=false}function stopSpeech(){if('speechSynthesis'in window){try{speechSynthesis.cancel()}catch(e){}}speaking=false;currentUtterance=null}function stopAll(){sessionToken++;clearTimeout(restartTimer);stopRecognition();stopSpeech();setState('idle','已停止。')}function chooseVoice(lang){const voices=speechSynthesis.getVoices();return voices.find(v=>v.lang.toLowerCase()===lang.toLowerCase())||voices.find(v=>v.lang.toLowerCase().startsWith(lang.slice(0,2).toLowerCase()))||null}function speak(text,restartAfter=true){if(!('speechSynthesis'in window)){setState('idle','此设备不支持网页朗读。');return}const token=++sessionToken;stopRecognition();speaking=true;$('answer').textContent=text;addLog('老伙计',text);setState('speaking','请等我说完。');const u=new SpeechSynthesisUtterance(text);currentUtterance=u;u.lang=/[一-龥]/.test(text)?'zh-CN':'en-CA';u.rate=.95;const voice=chooseVoice(u.lang);if(voice)u.voice=voice;u.onstart=()=>{if(token!==sessionToken)return;speaking=true;setState('speaking','请等我说完。')};u.onend=()=>{if(token!==sessionToken)return;speaking=false;currentUtterance=null;setState('idle',continuous&&restartAfter?'准备继续听你说。':'点麦克风继续。');if(continuous&&restartAfter){clearTimeout(restartTimer);restartTimer=setTimeout(()=>startListening(),900)}};u.onerror=e=>{if(token!==sessionToken)return;speaking=false;currentUtterance=null;setState('idle','语音播放失败：'+(e.error||'unknown'))};setTimeout(()=>{if(token===sessionToken)speechSynthesis.speak(u)},120)}function startListening(){if(!SR){setState('idle','当前浏览器不支持网页语音识别，请用文字输入。');return}if(speaking)return;clearTimeout(restartTimer);try{recognition.start()}catch(e){setState('idle','麦克风尚未准备好，请稍后再点一次。')}}function setupRecognition(){if(!SR){setState('idle','当前浏览器不支持网页语音识别，请用文字输入。');return}recognition=new SR();recognition.lang='zh-CN';recognition.continuous=false;recognition.interimResults=true;recognition.maxAlternatives=3;recognition.onstart=()=>{listening=true;setState('listening','请开始说话。')};recognition.onresult=e=>{let finalText='',interim='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;e.results[i].isFinal?finalText+=t:interim+=t}$('heard').textContent=finalText||interim||'正在听…';if(finalText){listening=false;try{recognition.abort()}catch(e){}handle(finalText.trim())}};recognition.onerror=e=>{listening=false;const m={'audio-capture':'没有取得麦克风音频。','not-allowed':'麦克风权限未允许。','no-speech':'没有听到声音，请再试一次。','network':'语音识别网络暂时不可用。'};setState('idle',m[e.error]||('识别错误：'+e.error))};recognition.onend=()=>{listening=false;if(!speaking)setState('idle',continuous?'等待下一轮。':'点麦克风继续。')}}function reply(text,restart=true){speak(text,restart)}function query(text){const q=text.toLowerCase();const item=inventory.find(x=>q.includes(x.name.toLowerCase()));if(!item){reply('我暂时没有找到这个产品。请再说一次产品名称。');return}reply(`${item.name}，${item.qty}${item.unit}，位置${item.loc}。`)}function handle(text){addLog('你',text);$('heard').textContent=text;const t=text.toLowerCase().trim();if(/^(老伙计|你好|在吗|old buddy)[。.!！]?$/.test(t)){reply('我在。今天准备做什么？');return}if(/查询|多少|库存|how many|where is|find|search/i.test(text)){query(text);return}if(/收货|receive/i.test(text)){reply('好，开始收货。请告诉我厂家。');return}if(/确认|confirm|save/i.test(text)){reply('好的，已经确认。');return}if(/取消|cancel|stop/i.test(text)){continuous=false;$('toggle').classList.remove('on');reply('已取消。',false);return}reply('我听到了，但这句话我还没有学会。现在可以试查询库存或者开始收货。')}$('mic').onclick=()=>{if(listening){stopRecognition();setState('idle','已停止监听。');return}if(speaking){stopSpeech();setState('idle','已停止朗读。');return}startListening()};$('soundTest').onclick=()=>{stopAll();speak('声音测试成功。老伙计，我在。',false)};$('stopAll').onclick=stopAll;$('toggle').onclick=()=>{continuous=!continuous;$('toggle').classList.toggle('on',continuous);$('detail').textContent=continuous?'连续对话已开启。':'连续对话已关闭。'};$('send').onclick=()=>{const v=$('manual').value.trim();if(!v)return;$('manual').value='';handle(v)};$('manual').addEventListener('keydown',e=>{if(e.key==='Enter')$('send').click()});setupRecognition();if('speechSynthesis'in window)speechSynthesis.getVoices();</script></body></html>
